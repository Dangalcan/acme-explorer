<mat-toolbar color="primary" class="px-8 flex justify-between shadow-md">
  <div class="flex items-center gap-3">
    <img src="/favicon.ico" alt="Acme Explorer logo" class="w-8 h-8" />
    <a mat-button routerLink="/trips" class="text-base font-semibold hover:opacity-90">
      Acme Explorer
    </a>
  </div>

  <div class="flex items-center gap-4 text-base font-medium">
    <a mat-button routerLink="/trips" i18n>Trips</a>
    <a mat-button routerLink="/applications" i18n>Applications</a>
    <a mat-button routerLink="/finder" i18n>Finder</a>
    <a mat-button routerLink="/settings" i18n>Settings</a>
    @if (currentRole() === 'administrator') {
      <button mat-button [matMenuTriggerFor]="adminMenu" i18n>Admin</button>
      <mat-menu #adminMenu="matMenu">
        <a mat-menu-item routerLink="/admin/dashboard" i18n>Dashboard</a>
        <a mat-menu-item routerLink="/admin/users" i18n>Users list</a>
        <a mat-menu-item routerLink="/admin/create-manager" i18n>Create manager</a>
      </mat-menu>
    }
  </div>

  <div class="flex items-center gap-4 text-sm font-medium">
    @if (currentUser()) {
      <button mat-button type="button" (click)="logout()" i18n>Logout</button>
    } @else {
      @if (router.url !== '/login') {
        <button mat-button type="button" (click)="goToLogin()" i18n>Login</button>
      }
      @if (router.url !== '/register') {
        <a mat-raised-button routerLink="/register" color="primary" i18n>Register</a>
      }
    }
  </div>
</mat-toolbar>
