<div class="auth-panel">
  @if (currentUser()) {
    <p class="auth-message">Logged in as {{ currentUser()?.email }}</p>
    <button class="auth-button" type="button" (click)="logout()">Logout</button>
  } @else {
    <button class="auth-button" type="button" (click)="goToLogin()">Login</button>
  }
</div>
