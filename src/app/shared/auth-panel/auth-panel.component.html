<div class="max-w-[700px] mx-auto mt-6 mb-4 px-6 py-4 bg-white rounded-xl shadow-lg flex justify-between items-center font-sans">
  <div class="flex items-center gap-2.5">
    <img src="/favicon.ico" alt="Angular logo" class="w-8 h-8" />
    <span class="text-xl font-bold text-[#b21c2b]">AcmeExplorer</span>
  </div>
  <div class="flex items-center gap-4">
    @if (currentUser()) {
      <p class="m-0 text-base text-[#2c3e50]">Logged in as {{ currentUser()?.email }}</p>
      <button class="px-5 py-2.5 rounded-md bg-[#b21c2b] hover:bg-[#8e1723] text-white font-bold cursor-pointer border-none transition-colors" type="button" (click)="logout()">Logout</button>
    } @else {
      <button class="px-5 py-2.5 rounded-md bg-[#b21c2b] hover:bg-[#8e1723] text-white font-bold cursor-pointer border-none transition-colors" type="button" (click)="goToLogin()">Login</button>
    }
  </div>
</div>
