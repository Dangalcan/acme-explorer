<div class="min-h-screen bg-slate-100 flex items-center justify-center px-4">

  <div class="animate-slide-up w-full max-w-md bg-white rounded-2xl shadow-xl p-8"
       [class.animate-shake]="isShaking()"
       (animationend)="isShaking.set(false)">

    <!-- Logo / Title -->
    <div class="animate-fade-in text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-red-50 border border-red-100 mb-4">
        <svg class="w-8 h-8 text-[#b21c2b]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-[#2c3e50]" i18n>Welcome back</h1>
      <p class="text-slate-500 text-sm mt-1" i18n>Log in to Acme Explorer</p>
    </div>

    <!-- Form -->
    <div class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-[#2c3e50] mb-1.5" i18n>Email</label>
        <input
          type="email"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          placeholder="Enter your email" i18n-placeholder
          class="w-full px-4 py-2.5 rounded-lg bg-white border border-slate-300 text-slate-800 placeholder-slate-400
                 focus:outline-none focus:ring-2 focus:ring-[#b21c2b] focus:border-transparent transition"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-[#2c3e50] mb-1.5" i18n>Password</label>
        <input
          type="password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          placeholder="Enter your password" i18n-placeholder
          class="w-full px-4 py-2.5 rounded-lg bg-white border border-slate-300 text-slate-800 placeholder-slate-400
                 focus:outline-none focus:ring-2 focus:ring-[#b21c2b] focus:border-transparent transition"
        />
      </div>

      @if (errorMessage()) {
        <p class="animate-fade-in text-[#b21c2b] text-sm flex items-center gap-1.5">
          <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
          </svg>
          {{ errorMessage() }}
        </p>
      }

      <!-- Buttons -->
      <div class="flex gap-3 pt-1">
        <button
          type="button"
          (click)="goBack()"
          class="flex-1 py-2.5 rounded-lg bg-[#6c757d] hover:bg-[#5a6268] active:scale-95
                 text-white font-bold transition-all duration-150 cursor-pointer" i18n>
          Back
        </button>
        <button
          type="button"
          (click)="login()"
          [disabled]="isLoading()"
          class="flex-1 py-2.5 rounded-lg bg-[#b21c2b] hover:bg-[#8e1723] active:scale-95
                 text-white font-bold transition-all duration-150 disabled:opacity-60 disabled:cursor-not-allowed">
          @if (isLoading()) {
            <span class="inline-flex items-center gap-2 justify-center">
              <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
              </svg>
              <ng-container i18n>Signing in…</ng-container>
            </span>
          } @else {
            <ng-container i18n>Log in</ng-container>
          }
        </button>
      </div>
    </div>

    <!-- Register link -->
    <p class="text-center text-sm text-slate-500 mt-6" i18n>
      Don't have an account?
      <a routerLink="/register" class="text-[#b21c2b] font-medium hover:text-[#8e1723] transition">Create one</a>
    </p>
  </div>

</div>
