<div class="min-h-screen bg-gradient-to-b from-slate-50 to-slate-100 py-10 px-4">
  <div class="max-w-3xl mx-auto animate-slide-up">

    <!-- Back link -->
    <a routerLink="/trips"
      class="inline-flex items-center gap-1.5 text-sm text-slate-500 hover:text-slate-800 mb-6 transition-colors" i18n>
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
      Back to trips
    </a>

    @if (trip(); as t) {
    <app-trip-card [trip]="t" mode="details" [reviews]="sampleReviews" />
    } @else {
    <div class="text-center py-20 text-slate-400">
      <p class="text-lg font-semibold" i18n>Trip not found.</p>
      <a routerLink="/trips" class="text-sm text-indigo-500 hover:underline mt-2 inline-block" i18n>Browse all trips</a>
    </div>
    }

  </div>
</div>
