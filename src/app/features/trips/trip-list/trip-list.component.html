<div class="min-h-screen bg-gradient-to-b from-slate-50 to-slate-100 py-10 px-4">

  <div class="max-w-6xl mx-auto">

    <!-- Page header -->
    <div class="mb-10 text-center animate-slide-up">
      <h1 class="text-4xl font-bold text-slate-800 tracking-tight">{{ 'trips.explore.title' | translate }}</h1>
      <p class="text-slate-500 mt-2 text-base">{{ 'trips.explore.subtitle' | translate }}</p>
      @if (currentRole() === 'manager') {
        <div class="mt-5">
          <a
            routerLink="/trips/create"
            class="inline-flex items-center gap-2 px-5 py-2.5 rounded-lg bg-[#b21c2b] hover:bg-[#8e1723]
                   text-white font-semibold text-sm transition-colors active:scale-95 shadow-sm"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
            {{ 'trips.list.create_trip' | translate }}
          </a>
        </div>
      }
    </div>

    <!-- Cards grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">

      @for (trip of availableTrips(); track trip.id; let i = $index) {
        <app-trip-card
          class="animate-slide-up"
          [trip]="trip"
          [style.animation-delay]="i * 100 + 'ms'"
          [enableFavouriteControls]="true"
          [favouritePanelOpen]="openFavouriteTripId() === trip.id"
          (favouritePanelToggle)="toggleFavouritePanel($event)"
          (favouritePanelClose)="closeFavouritePanel()"
          (apply)="applyTrip($event)"
          (view)="viewTrip($event)"
        />
      }

    </div>
  </div>
</div>
