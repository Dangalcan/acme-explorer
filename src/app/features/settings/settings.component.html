<div class="min-h-screen bg-gradient-to-b from-slate-50 to-slate-100 py-10 px-4">
  <div class="max-w-lg mx-auto">

    <div class="mb-8 animate-slide-up">
      <h1 class="text-3xl font-bold text-slate-800 tracking-tight">{{ 'settings.title' | translate }}</h1>
      <p class="text-slate-500 mt-1 text-sm">{{ 'settings.subtitle' | translate }}</p>
    </div>

    @if (isLoadingData()) {
      <div class="text-center py-16 text-slate-400 text-sm">Loading…</div>
    } @else {
      <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-8 space-y-5 animate-slide-up">

        <!-- Email (read-only) -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">
            {{ 'settings.email_label' | translate }}
          </label>
          <input
            type="email"
            [value]="email()"
            readonly
            class="w-full px-3 py-2.5 rounded-lg border border-slate-200 bg-slate-50
                   text-slate-500 text-sm cursor-not-allowed"
          />
          <p class="mt-1 text-xs text-slate-400">{{ 'settings.email_readonly_hint' | translate }}</p>
        </div>

        <!-- Name -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">
            {{ 'settings.name' | translate }} <span class="text-red-500">*</span>
          </label>
          <input
            type="text"
            [ngModel]="name()"
            (ngModelChange)="name.set($event)"
            [placeholder]="'settings.name' | translate"
            class="w-full px-3 py-2.5 rounded-lg border border-slate-200 bg-white
                   text-slate-800 text-sm focus:outline-none focus:ring-2
                   focus:ring-[#b21c2b]/40 focus:border-[#b21c2b] transition"
          />
        </div>

        <!-- Surname -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">
            {{ 'settings.surname' | translate }} <span class="text-red-500">*</span>
          </label>
          <input
            type="text"
            [ngModel]="surname()"
            (ngModelChange)="surname.set($event)"
            [placeholder]="'settings.surname' | translate"
            class="w-full px-3 py-2.5 rounded-lg border border-slate-200 bg-white
                   text-slate-800 text-sm focus:outline-none focus:ring-2
                   focus:ring-[#b21c2b]/40 focus:border-[#b21c2b] transition"
          />
        </div>

        <!-- Phone (optional) -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">
            {{ 'settings.phone' | translate }}
            <span class="text-slate-400 font-normal text-xs ml-1">{{ 'common.optional' | translate }}</span>
          </label>
          <input
            type="tel"
            [ngModel]="phoneNumber()"
            (ngModelChange)="phoneNumber.set($event)"
            placeholder="+1234567890"
            class="w-full px-3 py-2.5 rounded-lg border border-slate-200 bg-white
                   text-slate-800 text-sm focus:outline-none focus:ring-2
                   focus:ring-[#b21c2b]/40 focus:border-[#b21c2b] transition"
          />
        </div>

        <!-- Address (optional) -->
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">
            {{ 'settings.address' | translate }}
            <span class="text-slate-400 font-normal text-xs ml-1">{{ 'common.optional' | translate }}</span>
          </label>
          <input
            type="text"
            [ngModel]="address()"
            (ngModelChange)="address.set($event)"
            [placeholder]="'auth.register.address_placeholder' | translate"
            class="w-full px-3 py-2.5 rounded-lg border border-slate-200 bg-white
                   text-slate-800 text-sm focus:outline-none focus:ring-2
                   focus:ring-[#b21c2b]/40 focus:border-[#b21c2b] transition"
          />
        </div>

        <!-- Error message -->
        @if (errorMessage()) {
          <p class="text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-4 py-2.5">
            {{ errorMessage() }}
          </p>
        }

        <!-- Success message -->
        @if (successMessage()) {
          <p class="text-sm text-green-700 bg-green-50 border border-green-200 rounded-lg px-4 py-2.5">
            {{ successMessage() }}
          </p>
        }

        <!-- Save button -->
        <button
          (click)="save()"
          [disabled]="isLoading()"
          class="w-full py-2.5 rounded-lg bg-[#b21c2b] hover:bg-[#8e1723] text-white font-semibold text-sm
                 transition-colors active:scale-95 shadow-sm disabled:opacity-60 disabled:cursor-not-allowed"
        >
          {{ isLoading() ? ('settings.saving' | translate) : ('settings.save' | translate) }}
        </button>

      </div>
    }
  </div>
</div>
