<div class="min-h-screen bg-slate-100 dark:bg-slate-900 flex items-center justify-center px-4 py-10">

  <div class="animate-slide-up w-full max-w-md bg-white dark:bg-slate-800 rounded-2xl shadow-xl p-8"
       [class.animate-shake]="isShaking()"
       (animationend)="isShaking.set(false)">

    <!-- Title -->
    <div class="animate-fade-in text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-red-50 dark:bg-red-900/20 border border-red-100 dark:border-red-800/40 mb-4">
        <svg class="w-8 h-8 text-[#b21c2b]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-[#2c3e50] dark:text-slate-100">{{ 'admin.create_manager.title' | translate }}</h1>
      <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">{{ 'admin.create_manager.subtitle' | translate }}</p>
    </div>

    <!-- Form -->
    <div class="space-y-5">

      <!-- Name + Surname row -->
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-[#2c3e50] dark:text-slate-300 mb-1.5">
            {{ 'auth.register.name' | translate }} <span class="text-[#b21c2b]">*</span>
          </label>
          <input
            type="text"
            [ngModel]="name()"
            (ngModelChange)="name.set($event)"
            [placeholder]="'admin.create_manager.name_placeholder' | translate"
            [maxlength]="validation.name.maxLength"
            class="w-full px-4 py-2.5 rounded-lg bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 text-slate-800 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500
                   focus:outline-none focus:ring-2 focus:ring-[#b21c2b] focus:border-transparent transition"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-[#2c3e50] dark:text-slate-300 mb-1.5">
            {{ 'auth.register.surname' | translate }} <span class="text-[#b21c2b]">*</span>
          </label>
          <input
            type="text"
            [ngModel]="surname()"
            (ngModelChange)="surname.set($event)"
            [placeholder]="'admin.create_manager.surname_placeholder' | translate"
            [maxlength]="validation.surname.maxLength"
            class="w-full px-4 py-2.5 rounded-lg bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 text-slate-800 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500
                   focus:outline-none focus:ring-2 focus:ring-[#b21c2b] focus:border-transparent transition"
          />
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-[#2c3e50] dark:text-slate-300 mb-1.5">
          {{ 'auth.register.email' | translate }} <span class="text-[#b21c2b]">*</span>
        </label>
        <input
          type="email"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          [placeholder]="'admin.create_manager.email_placeholder' | translate"
          class="w-full px-4 py-2.5 rounded-lg bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 text-slate-800 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500
                 focus:outline-none focus:ring-2 focus:ring-[#b21c2b] focus:border-transparent transition"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-[#2c3e50] dark:text-slate-300 mb-1.5">
          {{ 'auth.register.phone' | translate }} <span class="text-slate-400 dark:text-slate-500 font-normal">{{ 'common.optional' | translate }}</span>
        </label>
        <input
          type="tel"
          [ngModel]="phoneNumber()"
          (ngModelChange)="phoneNumber.set($event)"
          [placeholder]="'admin.create_manager.phone_placeholder' | translate"
          class="w-full px-4 py-2.5 rounded-lg bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 text-slate-800 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500
                 focus:outline-none focus:ring-2 focus:ring-[#b21c2b] focus:border-transparent transition"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-[#2c3e50] dark:text-slate-300 mb-1.5">
          {{ 'auth.register.address' | translate }} <span class="text-slate-400 dark:text-slate-500 font-normal">{{ 'common.optional' | translate }}</span>
        </label>
        <input
          type="text"
          [ngModel]="address()"
          (ngModelChange)="address.set($event)"
          [placeholder]="'admin.create_manager.address_placeholder' | translate"
          [maxlength]="validation.address.maxLength"
          class="w-full px-4 py-2.5 rounded-lg bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 text-slate-800 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500
                 focus:outline-none focus:ring-2 focus:ring-[#b21c2b] focus:border-transparent transition"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-[#2c3e50] dark:text-slate-300 mb-1.5">
          {{ 'auth.register.password' | translate }} <span class="text-[#b21c2b]">*</span>
        </label>
        <input
          type="password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          [placeholder]="'admin.create_manager.password_placeholder' | translate"
          class="w-full px-4 py-2.5 rounded-lg bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 text-slate-800 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500
                 focus:outline-none focus:ring-2 focus:ring-[#b21c2b] focus:border-transparent transition"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-[#2c3e50] dark:text-slate-300 mb-1.5">
          {{ 'auth.register.confirm_password' | translate }} <span class="text-[#b21c2b]">*</span>
        </label>
        <input
          type="password"
          [ngModel]="confirmPassword()"
          (ngModelChange)="confirmPassword.set($event)"
          [placeholder]="'admin.create_manager.confirm_placeholder' | translate"
          class="w-full px-4 py-2.5 rounded-lg bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 text-slate-800 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500
                 focus:outline-none focus:ring-2 focus:ring-[#b21c2b] focus:border-transparent transition"
        />
      </div>

      @if (errorMessage()) {
        <p class="animate-fade-in text-[#b21c2b] text-sm flex items-center gap-1.5">
          <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
          </svg>
          {{ errorMessage() }}
        </p>
      }

      @if (successMessage()) {
        <p class="animate-fade-in text-green-600 dark:text-green-400 text-sm flex items-center gap-1.5">
          <svg class="w-4 h-4 shrink-0" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
          </svg>
          {{ successMessage() }}
        </p>
      }

      <!-- Buttons -->
      <div class="flex gap-3 pt-1">
        <a routerLink="/admin/dashboard"
           class="flex-1 py-2.5 rounded-lg bg-[#6c757d] hover:bg-[#5a6268] active:scale-95
                  text-white font-bold text-center transition-all duration-150 cursor-pointer">
          {{ 'common.back' | translate }}
        </a>
        <button
          type="button"
          (click)="createManager()"
          [disabled]="isLoading()"
          class="flex-1 py-2.5 rounded-lg bg-[#b21c2b] hover:bg-[#8e1723] active:scale-95
                 text-white font-bold transition-all duration-150 disabled:opacity-60 disabled:cursor-not-allowed">
          @if (isLoading()) {
            <span class="inline-flex items-center gap-2 justify-center">
              <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
              </svg>
              {{ 'admin.create_manager.creating' | translate }}
            </span>
          } @else {
            {{ 'admin.create_manager.submit' | translate }}
          }
        </button>
      </div>
    </div>
  </div>

</div>
